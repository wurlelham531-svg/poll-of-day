<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poll of the Day</title>
<meta name="description" content="Poll of the Day -- vote on rotating daily polls (Stacks Clarity 4)" />
<meta name="talentapp:project_verification" content="ecbf74203888178ca41d550ee79ff4faf577e2af423f6c108a54321774f925f342f984aa5b29cc8b30457d912cb15c23ef142330d44b4356b8083e58ed280653">
<style>
  :root { color-scheme: dark; }
  body {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #0a1a0e; color: #e8eaed;
    max-width: 640px; margin: 0 auto; padding: 32px 20px;
    line-height: 1.5;
  }
  h1 { font-size: 28px; margin-bottom: 8px; color: #6fd97c; }
  p.tagline { color: #8aa68f; margin-top: 0; }
  .card {
    background: #162c1b; border: 1px solid #254a2d; border-radius: 8px;
    padding: 24px; margin: 24px 0;
  }
  label { display: block; margin: 12px 0 4px; color: #8aa68f; font-size: 13px; }
  select, input {
    background: #0a1a0e; color: #e8eaed; border: 1px solid #2c4a36;
    padding: 8px 10px; border-radius: 4px; font-family: inherit; font-size: 14px;
    width: 100%; box-sizing: border-box;
  }
  button {
    background: #2a985b; color: white; border: 0; padding: 12px 24px;
    border-radius: 6px; font-size: 16px; cursor: pointer; font-family: inherit;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #33b86f; }
  .row { display: flex; gap: 12px; align-items: center; margin-top: 16px; }
  .addr, .log { font-size: 12px; color: #8aa68f; word-break: break-all; }
  .log { margin-top: 16px; }
  .log code { color: #e8eaed; background: #0a1a0e; padding: 2px 6px; border-radius: 3px; }
  a { color: #6fd97c; }
</style>
</head>
<body>
  <h1>Poll of the Day</h1>
  <p class="tagline">7 rotating polls, 3 options each. Cast your vote on-chain.</p>

  <div class="card">
    <label for="day">Day (1-7)</label>
    <select id="day">
      <option value="1">1 - Mon</option><option value="2">2 - Tue</option><option value="3">3 - Wed</option>
      <option value="4">4 - Thu</option><option value="5">5 - Fri</option><option value="6">6 - Sat</option>
      <option value="7">7 - Sun</option>
    </select>
    <label for="option">Option (1-3)</label>
    <select id="option">
      <option value="1">Option 1 -- Yes</option>
      <option value="2">Option 2 -- No</option>
      <option value="3">Option 3 -- Abstain</option>
    </select>
    <div class="addr" id="who" style="margin-top:16px;">not connected</div>
  </div>

  <div class="row">
    <button id="connect">Connect Wallet</button>
    <button id="vote" disabled>Vote</button>
  </div>

  <div class="log" id="log"></div>

  <p class="addr" style="margin-top:32px;">
    Contract: <a id="contractLink" target="_blank" rel="noopener"></a><br />
    Network: Stacks Mainnet &middot; Clarity 4
  </p>

<script type="module">
  import { showConnect, openContractCall } from "https://esm.sh/@stacks/connect@7.7.1";
  import { uintCV, PostConditionMode } from "https://esm.sh/@stacks/transactions@6.17.0";

  const CONTRACT_ADDRESS = "SP16F6839630K5XX06KE7KVNSNMYBK89912NH6N4C";
  const CONTRACT_NAME    = "poll-of-day";
  const APP_NAME         = "Poll of the Day";

  const $ = (id) => document.getElementById(id);
  $("contractLink").href = `https://explorer.hiro.so/${CONTRACT_ADDRESS}.${CONTRACT_NAME}?chain=mainnet`;
  $("contractLink").textContent = `${CONTRACT_ADDRESS}.${CONTRACT_NAME}`;

  $("connect").onclick = () => {
    showConnect({
      appDetails: { name: APP_NAME, icon: window.location.origin + "/icon.png" },
      onFinish: ({ userSession }) => {
        const ud = userSession.loadUserData();
        $("who").textContent = "you: " + ud.profile.stxAddress.mainnet;
        $("vote").disabled = false;
      },
    });
  };

  $("vote").onclick = () => {
    const day = Number($("day").value);
    const option = Number($("option").value);
    openContractCall({
      contractAddress: CONTRACT_ADDRESS,
      contractName:    CONTRACT_NAME,
      functionName:    "vote",
      functionArgs:    [uintCV(day), uintCV(option)],
      postConditionMode: PostConditionMode.Allow,
      network: "mainnet",
      appDetails: { name: APP_NAME, icon: window.location.origin + "/icon.png" },
      onFinish: (data) => {
        $("log").innerHTML = `vote tx: <code>${data.txId}</code> &mdash; <a href="https://explorer.hiro.so/txid/${data.txId}?chain=mainnet" target="_blank">explorer</a>`;
      },
    });
  };
</script>
</body>
</html>
