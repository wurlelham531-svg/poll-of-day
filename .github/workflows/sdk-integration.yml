name: SDK Integration & Demo

on:
  schedule:
    - cron: '23 */3 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/sdk-integration.yml'
  workflow_dispatch:

jobs:
  sdk-install-verify:
    name: Install & Verify SDK (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install poll-of-day-sdk from npm registry
        run: npm install poll-of-day-sdk

      - name: Verify SDK installation
        continue-on-error: true
        run: |
          node -e "
            const sdk = require('poll-of-day-sdk');
            console.log('poll-of-day-sdk installed successfully');
            console.log('Exports:', Object.keys(sdk).join(', '));
          "

      - name: Check SDK version
        continue-on-error: true
        run: npm list poll-of-day-sdk

  sdk-cross-platform:
    name: Cross-platform SDK Test
    runs-on: ${{ matrix.os }}
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install poll-of-day-sdk
        run: npm install poll-of-day-sdk

      - name: Verify SDK on ${{ matrix.os }}
        continue-on-error: true
        run: node -e "const sdk = require('poll-of-day-sdk'); console.log('SDK works on ${{ matrix.os }}');"

  sdk-stress-test:
    name: SDK Stress Test (Installation ${{ matrix.installation }})
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        installation: [1, 2, 3, 4, 5]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install poll-of-day-sdk (Run #${{ matrix.installation }})
        run: npm install poll-of-day-sdk

      - name: Verify SDK installation
        continue-on-error: true
        run: |
          node -e "
            const sdk = require('poll-of-day-sdk');
            console.log('Installation #${{ matrix.installation }} successful');
            console.log('Exports:', Object.keys(sdk).join(', '));
          "
